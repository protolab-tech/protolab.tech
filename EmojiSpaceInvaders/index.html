<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Emoji Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #020608;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .header {
      margin-bottom: 12px;
      text-align: center;
    }
    .title {
      color: #00ff66;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      text-shadow: 0 0 18px #00ff66, 0 0 40px rgba(0, 255, 102, 0.53);
    }
    .hi-score-display {
      color: rgba(0, 255, 102, 0.4);
      font-size: 12px;
      letter-spacing: 3px;
      margin-top: 2px;
    }
    .canvas-wrapper {
      position: relative;
      border: 2px solid rgba(0, 255, 102, 0.2);
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0, 255, 102, 0.13);
    }
    canvas {
      display: block;
      max-width: 100%;
      border-radius: 2px;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 10, 20, 0.88);
      font-family: 'Courier New', monospace;
      color: #00ff66;
    }
    .overlay.hidden { display: none; }
    .overlay .big-emoji { font-size: 64px; margin-bottom: 8px; }
    .overlay .overlay-title {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 5px;
      text-shadow: 0 0 20px #00ff66;
    }
    .overlay .instructions {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(0, 255, 102, 0.6);
      line-height: 2;
      text-align: center;
    }
    .btn-play {
      margin-top: 32px;
      padding: 12px 40px;
      background: transparent;
      border: 2px solid #00ff66;
      color: #00ff66;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.33);
      transition: background 0.2s;
    }
    .btn-play:hover { background: rgba(0, 255, 102, 0.13); }
    .btn-play.dead {
      border-color: #ff4444;
      color: #ff4444;
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.33);
    }
    .btn-play.dead:hover { background: rgba(255, 68, 68, 0.13); }
    .dead-title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      margin-top: 8px;
      color: #ff4444;
      text-shadow: 0 0 20px #ff4444;
    }
    .dead-score { margin-top: 16px; font-size: 20px; color: #00ff66; }
    .dead-hi { font-size: 14px; color: rgba(0, 255, 102, 0.4); margin-top: 4px; }
    .footer-hint {
      margin-top: 10px;
      color: rgba(0, 255, 102, 0.2);
      font-size: 11px;
      letter-spacing: 2px;
    }

    .touch-controls {
      display: none;
      margin-top: 16px;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
    .touch-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(0, 255, 102, 0.4);
      background: rgba(0, 255, 102, 0.08);
      color: #00ff66;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .touch-btn:active, .touch-btn.pressed {
      background: rgba(0, 255, 102, 0.25);
      border-color: #00ff66;
    }
    .touch-btn-fire {
      width: 88px;
      height: 88px;
      font-size: 32px;
      border-color: rgba(255, 100, 50, 0.5);
      background: rgba(255, 100, 50, 0.08);
      color: #ff6432;
    }
    .touch-btn-fire:active, .touch-btn-fire.pressed {
      background: rgba(255, 100, 50, 0.3);
      border-color: #ff6432;
    }
    .touch-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .touch-spacer { width: 40px; }

    @media (hover: none) and (pointer: coarse) {
      .touch-controls { display: flex; }
      .footer-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">👾 EMOJI INVADERS 👾</div>
    <div class="hi-score-display" id="hiScoreHeader">HI-SCORE: 0</div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="game" width="660" height="560"></canvas>

    <div class="overlay" id="titleScreen">
      <div class="big-emoji">👾</div>
      <div class="overlay-title">EMOJI INVADERS</div>
      <div class="instructions">
        <div>👾 👽 🛸 🤖 — defend Earth!</div>
        <div>← → to move &nbsp;&nbsp; SPACE to fire</div>
        <div>🛡️ shields absorb hits</div>
      </div>
      <button class="btn-play" id="btnStart">INSERT COIN</button>
    </div>

    <div class="overlay hidden" id="deadScreen">
      <div style="font-size:56px">💀</div>
      <div class="dead-title">GAME OVER</div>
      <div class="dead-score" id="deadScore">SCORE: 0</div>
      <div class="dead-hi" id="deadHi">HI-SCORE: 0</div>
      <button class="btn-play dead" id="btnRetry">TRY AGAIN</button>
    </div>
  </div>

  <div class="footer-hint">USE KEYBOARD — ARROWS + SPACE &nbsp;|&nbsp; CLICK CANVAS TO FOCUS</div>

  <div class="touch-controls" id="touchControls">
    <div class="touch-group">
      <button class="touch-btn" id="btnLeft">◀</button>
      <button class="touch-btn" id="btnRight">▶</button>
    </div>
    <div class="touch-spacer"></div>
    <button class="touch-btn touch-btn-fire" id="btnFire">🔥</button>
  </div>

  <script>
    const COLS = 11, ROWS = 4;
    const CELL_W = 56, CELL_H = 52;
    const CANVAS_W = 660, CANVAS_H = 560;
    const PLAYER_Y = CANVAS_H - 56;
    const PLAYER_SPEED = 5;
    const BULLET_SPEED = 9;
    const ENEMY_BULLET_SPEED = 4;
    const ENEMY_DROP = 18;
    const EMOJI_FONT = "'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', 'Twemoji Mozilla', sans-serif";
    const ENEMY_EMOJIS = ["👾", "👽", "🛸", "🤖"];
    const EXPLOSION = "💥", PLAYER_EMOJI = "🚀", BULLET_EMOJI = "⚡";
    const ENEMY_BULLET_EMOJI = "🔴", SHIELD_EMOJI = "🛡️";
    const LIVES_EMOJI = "❤️";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const titleScreen = document.getElementById("titleScreen");
    const deadScreen = document.getElementById("deadScreen");

    let hiScore = 0;
    let animId = null;
    let keys = {};
    let s = null;

    // Pre-render emojis to offscreen canvases for reliable cross-platform display
    const emojiCache = {};
    function renderEmoji(emoji, size) {
      const key = emoji + size;
      if (emojiCache[key]) return emojiCache[key];
      const off = document.createElement("canvas");
      const pad = Math.ceil(size * 0.2);
      off.width = size + pad * 2;
      off.height = size + pad * 2;
      const oc = off.getContext("2d");
      oc.font = size + "px " + EMOJI_FONT;
      oc.textBaseline = "top";
      oc.textAlign = "left";
      oc.clearRect(0, 0, off.width, off.height);
      oc.fillText(emoji, pad, pad);
      emojiCache[key] = { canvas: off, pad };
      return emojiCache[key];
    }

    function drawEmoji(emoji, size, x, y, alpha) {
      if (alpha !== undefined) ctx.globalAlpha = alpha;
      const e = renderEmoji(emoji, size);
      ctx.drawImage(e.canvas, x - e.pad, y - e.pad);
      if (alpha !== undefined) ctx.globalAlpha = 1;
    }

    function makeInvaders() {
      const grid = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          grid.push({
            row: r, col: c,
            x: 40 + c * CELL_W, y: 60 + r * CELL_H,
            alive: true, emoji: ENEMY_EMOJIS[Math.min(r, ENEMY_EMOJIS.length - 1)],
            exploding: false, explodeTimer: 0,
          });
        }
      }
      return grid;
    }

    function makeShields() {
      return [120, 260, 400, 540].map((x, i) => ({ id: i, x, y: PLAYER_Y - 60, hp: 4 }));
    }

    function initGame(waveNum) {
      s = {
        player: { x: CANVAS_W / 2 - 20, y: PLAYER_Y },
        invaders: makeInvaders(),
        shields: makeShields(),
        bullets: [], enemyBullets: [], explosions: [],
        stars: Array.from({ length: 60 }, () => ({
          x: Math.random() * CANVAS_W, y: Math.random() * CANVAS_H,
          s: Math.random() * 2 + 0.5, sp: Math.random() * 0.4 + 0.1,
        })),
        dir: 1, moveTimer: 0,
        moveInterval: Math.max(8, 28 - waveNum * 3),
        shootTimer: 0,
        shootInterval: Math.max(40, 90 - waveNum * 8),
        playerShootCooldown: 0,
        score: 0, lives: 3, wave: waveNum,
        gameOver: false, won: false,
        playerHit: false, playerHitTimer: 0,
      };
    }

    function showDead() {
      document.getElementById("deadScore").textContent = "SCORE: " + s.score;
      document.getElementById("deadHi").textContent = "HI-SCORE: " + hiScore;
      deadScreen.classList.remove("hidden");
      titleScreen.classList.add("hidden");
    }

    function hideOverlays() {
      titleScreen.classList.add("hidden");
      deadScreen.classList.add("hidden");
    }

    function updateHiHeader() {
      document.getElementById("hiScoreHeader").textContent = "HI-SCORE: " + hiScore;
    }

    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      initGame(1);
      hideOverlays();
      loop();
    }

    function loop() {
      s.stars.forEach(st => { st.y += st.sp; if (st.y > CANVAS_H) st.y = 0; });

      if (keys["ArrowLeft"] || keys["KeyA"]) s.player.x = Math.max(0, s.player.x - PLAYER_SPEED);
      if (keys["ArrowRight"] || keys["KeyD"]) s.player.x = Math.min(CANVAS_W - 44, s.player.x + PLAYER_SPEED);

      if (s.playerShootCooldown > 0) s.playerShootCooldown--;
      if ((keys["Space"] || keys["ArrowUp"]) && s.playerShootCooldown === 0) {
        s.bullets.push({ x: s.player.x + 20, y: s.player.y - 10 });
        s.playerShootCooldown = 18;
      }

      s.bullets = s.bullets.filter(b => b.y > -20);
      s.bullets.forEach(b => { b.y -= BULLET_SPEED; });

      s.enemyBullets = s.enemyBullets.filter(b => b.y < CANVAS_H + 20);
      s.enemyBullets.forEach(b => { b.y += ENEMY_BULLET_SPEED; });

      s.moveTimer++;
      if (s.moveTimer >= s.moveInterval) {
        s.moveTimer = 0;
        const alive = s.invaders.filter(i => i.alive);
        const leftmost = Math.min(...alive.map(i => i.x));
        const rightmost = Math.max(...alive.map(i => i.x + CELL_W - 10));
        let drop = false;
        if (s.dir === 1 && rightmost >= CANVAS_W - 10) { s.dir = -1; drop = true; }
        if (s.dir === -1 && leftmost <= 10) { s.dir = 1; drop = true; }
        s.invaders.forEach(inv => {
          if (!inv.alive) return;
          inv.x += s.dir * 14;
          if (drop) inv.y += ENEMY_DROP;
        });
        if (s.invaders.some(i => i.alive && i.y + 40 >= PLAYER_Y)) {
          s.lives = 0; s.gameOver = true;
        }
      }

      s.shootTimer++;
      if (s.shootTimer >= s.shootInterval) {
        s.shootTimer = 0;
        const alive = s.invaders.filter(i => i.alive);
        if (alive.length) {
          const shooter = alive[Math.floor(Math.random() * alive.length)];
          s.enemyBullets.push({ x: shooter.x + 20, y: shooter.y + 36 });
        }
      }

      s.bullets.forEach(b => {
        s.invaders.forEach(inv => {
          if (!inv.alive || inv.exploding) return;
          if (b.x > inv.x && b.x < inv.x + 44 && b.y > inv.y && b.y < inv.y + 44) {
            inv.alive = false;
            inv.exploding = true;
            inv.explodeTimer = 20;
            b.y = -999;
            s.score += (ROWS - inv.row) * 10;
            s.explosions.push({ x: inv.x, y: inv.y, t: 20 });
          }
        });
      });

      s.explosions = s.explosions.filter(e => e.t > 0);
      s.explosions.forEach(e => e.t--);
      s.invaders.forEach(inv => {
        if (inv.exploding) { inv.explodeTimer--; if (inv.explodeTimer <= 0) inv.exploding = false; }
      });

      if (!s.playerHit) {
        s.enemyBullets.forEach(b => {
          if (b.x > s.player.x && b.x < s.player.x + 44 && b.y > s.player.y && b.y < s.player.y + 44) {
            b.y = CANVAS_H + 100;
            s.lives--;
            s.playerHit = true;
            s.playerHitTimer = 60;
            if (s.lives <= 0) s.gameOver = true;
          }
        });
      } else {
        s.playerHitTimer--;
        if (s.playerHitTimer <= 0) s.playerHit = false;
      }

      s.enemyBullets.forEach(b => {
        s.shields.forEach(sh => {
          if (sh.hp <= 0) return;
          if (b.x > sh.x - 10 && b.x < sh.x + 50 && b.y > sh.y && b.y < sh.y + 30) {
            b.y = CANVAS_H + 100; sh.hp--;
          }
        });
      });
      s.bullets.forEach(b => {
        s.shields.forEach(sh => {
          if (sh.hp <= 0) return;
          if (b.x > sh.x - 10 && b.x < sh.x + 50 && b.y > sh.y && b.y < sh.y + 30) {
            b.y = -999; sh.hp--;
          }
        });
      });

      if (s.invaders.filter(i => i.alive).length === 0) s.won = true;

      // ---- DRAW ----
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = "#050a14";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.fillStyle = "#ffffff";
      s.stars.forEach(st => {
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 800 + st.x) * 0.3;
        ctx.beginPath();
        ctx.arc(st.x, st.y, st.s, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      ctx.fillStyle = "rgba(0,200,80,0.015)";
      for (let y = 0; y < CANVAS_H; y += 3) ctx.fillRect(0, y, CANVAS_W, 1);

      ctx.strokeStyle = "#00ff6633";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, PLAYER_Y + 44);
      ctx.lineTo(CANVAS_W, PLAYER_Y + 44);
      ctx.stroke();

      // Invaders (pre-rendered emoji)
      s.invaders.forEach(inv => {
        if (!inv.alive && !inv.exploding) return;
        const alpha = inv.exploding ? inv.explodeTimer / 20 : 1;
        drawEmoji(inv.exploding ? EXPLOSION : inv.emoji, 34, inv.x, inv.y, alpha);
      });

      // Shields
      s.shields.forEach(sh => {
        if (sh.hp <= 0) return;
        drawEmoji(SHIELD_EMOJI, 30, sh.x, sh.y, sh.hp / 4);
      });

      // Player bullets
      s.bullets.forEach(b => {
        if (b.y < -10) return;
        drawEmoji(BULLET_EMOJI, 20, b.x - 10, b.y);
      });

      // Enemy bullets
      s.enemyBullets.forEach(b => {
        drawEmoji(ENEMY_BULLET_EMOJI, 18, b.x - 9, b.y);
      });

      // Player
      if (!s.gameOver) {
        const pAlpha = s.playerHit ? (Math.floor(s.playerHitTimer / 6) % 2 === 0 ? 0.3 : 1) : 1;
        drawEmoji(PLAYER_EMOJI, 40, s.player.x, s.player.y, pAlpha);
      }

      // HUD
      ctx.fillStyle = "#00ff66";
      ctx.font = "bold 14px 'Courier New', monospace";
      ctx.textAlign = "left";
      ctx.fillText("SCORE: " + s.score, 10, 24);
      ctx.textAlign = "center";
      ctx.fillText("WAVE " + s.wave, CANVAS_W / 2, 24);
      ctx.textAlign = "right";
      ctx.fillText("HI: " + Math.max(s.score, hiScore), CANVAS_W - 10, 24);

      // Lives
      ctx.textAlign = "left";
      for (let i = 0; i < s.lives; i++) drawEmoji(LIVES_EMOJI, 18, 10 + i * 24, CANVAS_H - 24);

      ctx.fillStyle = "#00ff6644";
      ctx.font = "11px 'Courier New', monospace";
      ctx.textAlign = "right";
      ctx.fillText("\u2190 \u2192 MOVE   SPACE SHOOT", CANVAS_W - 10, CANVAS_H - 8);

      if (s.gameOver) {
        hiScore = Math.max(hiScore, s.score);
        updateHiHeader();
        showDead();
        return;
      }

      if (s.won) {
        hiScore = Math.max(hiScore, s.score);
        updateHiHeader();
        const nextWave = s.wave + 1;
        const prevScore = s.score;
        const prevLives = s.lives;
        initGame(nextWave);
        s.score = prevScore;
        s.lives = prevLives;
      }

      animId = requestAnimationFrame(loop);
    }

    // Keyboard controls
    window.addEventListener("keydown", e => {
      keys[e.code] = true;
      if (["Space", "ArrowUp", "ArrowDown"].includes(e.code)) e.preventDefault();
    });
    window.addEventListener("keyup", e => { keys[e.code] = false; });

    // Touch controls
    function bindTouch(btnId, keyCode) {
      const btn = document.getElementById(btnId);
      btn.addEventListener("touchstart", e => { e.preventDefault(); keys[keyCode] = true; btn.classList.add("pressed"); }, { passive: false });
      btn.addEventListener("touchend", e => { e.preventDefault(); keys[keyCode] = false; btn.classList.remove("pressed"); }, { passive: false });
      btn.addEventListener("touchcancel", e => { keys[keyCode] = false; btn.classList.remove("pressed"); });
      btn.addEventListener("mousedown", e => { e.preventDefault(); keys[keyCode] = true; btn.classList.add("pressed"); });
      btn.addEventListener("mouseup", e => { e.preventDefault(); keys[keyCode] = false; btn.classList.remove("pressed"); });
      btn.addEventListener("mouseleave", () => { keys[keyCode] = false; btn.classList.remove("pressed"); });
    }
    bindTouch("btnLeft", "ArrowLeft");
    bindTouch("btnRight", "ArrowRight");
    bindTouch("btnFire", "Space");

    document.getElementById("btnStart").addEventListener("click", startGame);
    document.getElementById("btnRetry").addEventListener("click", startGame);
    canvas.addEventListener("click", () => canvas.focus());
  </script>
</body>
</html>
